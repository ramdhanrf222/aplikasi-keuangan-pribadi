  <style>
    /* ==========================================================================
       1. LAYOUT UTAMA, MOTION 120Hz, DAN ANTI-HIGHLIGHT TEXT

    :root {
      --motion-fast: 110ms;

    html, body {

    body.modal-scroll-locked {

    body.modal-scroll-locked .app-container {

    }

    .app-title.greeting-changing {

      filter: blur(5px);

    .settings-btn,

    .transaction-item {

      --press-scale: 1;
      --stack-slot: 0;
      --stack-z: 1;

      transform-origin: center top;
      z-index: var(--stack-z);
      will-change: transform, opacity;
      backface-visibility: hidden;
      transition: background-color var(--motion-fast) linear, border-color var(--motion-fast) linear, box-shadow var(--motion-fast) linear, opacity var(--motion-fast) linear;
    }
    .stacked-list .transaction-item {

    .transaction-item:active { background: rgba(255, 255, 255, 0.18); --press-scale: 0.985; }

    #historyContainer .transaction-item { position: relative; top: auto; box-shadow: none; transform: none; opacity: 1; z-index: 1; }

    .tx-checkbox {

      height: 22px;

      border-radius: 6px;

    .tx-checkbox:checked { background: #3b82f6; border-color: #3b82f6; transform: scale(1.04); }
    .tx-checkbox:checked::after { content: '✓'; color: white; font-size: 14px; font-weight: bold; }

    /* ==========================================================================
       2. SEGMEN CONTROL (TIPE TRANSAKSI)
       ========================================================================== */
    .segmented-control { display: flex; position: relative; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 14px; padding: 3px; width: 100%; height: 48px; align-items: center; justify-content: center; }
    .segmented-control input[type="radio"] { display: none; }
    .segment-label { flex: 1; text-align: center; font-size: 14px; font-weight: 600; z-index: 2; cursor: pointer; color: rgba(255, 255, 255, 0.5); transition: color var(--motion-med) linear, text-shadow var(--motion-med) linear; height: 100%; display: flex; align-items: center; justify-content: center; }
    .segmented-glider { position: absolute; height: calc(100% - 6px); width: calc(50% - 3px); border-radius: 11px; left: 3px; z-index: 1; transition: transform var(--motion-med) var(--ease-ios), background-color var(--motion-med) linear, border-color var(--motion-med) linear; pointer-events: none; transform: translate3d(0,0,0); }

    #typeExpense:checked ~ .segmented-glider { background: linear-gradient(135deg, rgba(239,68,68,0.25) 0%, rgba(239,68,68,0.1) 100%); border: 1px solid rgba(239,68,68,0.5); transform: translate3d(0,0,0); }

    #typeIncome:checked + .label-income { color: #4ade80; text-shadow: 0 0 10px rgba(34,197,94,0.5); }

    /* ==========================================================================
       3. MODAL & ANIMASI
       ========================================================================== */
    .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 100; opacity: 0; pointer-events: none; transition: opacity var(--motion-med) linear; will-change: opacity; transform: translateZ(0); }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }

    .form-modal { position: fixed; bottom: 0; left: 50%; transform: translate3d(-50%, 100%, 0); width: 100%; max-width: 440px; background: rgba(255, 255, 255, 0.14); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-top: 1px solid rgba(255, 255, 255, 0.3); border-left: 1px solid rgba(255, 255, 255, 0.2); border-right: 1px solid rgba(255, 255, 255, 0.2); border-radius: 32px 32px 0 0; padding: 28px 24px 40px 24px; box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.3); z-index: 101; transition: transform var(--motion-sheet) var(--ease-ios); will-change: transform; backface-visibility: hidden; contain: layout paint style; }
    .form-modal.active { transform: translate3d(-50%, 0, 0); }

    }

    .fab-btn { position: fixed; bottom: 24px; left: 50%; transform: translate3d(-50%, 0, 0); width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%); border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 8px 25px rgba(6, 182, 212, 0.5); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 90; transition: transform var(--motion-med) var(--ease-pop), box-shadow var(--motion-fast) linear; will-change: transform; }
    .fab-btn:active { transform: translate3d(-50%, 0, 0) scale(0.9); }
    .fab-icon { width: 24px; height: 24px; fill: none; stroke: white; stroke-width: 3; stroke-linecap: round; }

    .toast { position: fixed; top: 24px; left: 50%; transform: translate3d(-50%, -100px, 0); background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); padding: 14px 24px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.25); z-index: 200; display: flex; align-items: center; gap: 10px; font-weight: 500; font-size: 14px; width: calc(100% - 32px); max-width: 380px; transition: transform var(--motion-sheet) var(--ease-ios); will-change: transform; }
    .toast.show { transform: translate3d(-50%, 0, 0); }
    .toast-icon { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>

  <div id="toastNotification" class="toast">
    <div id="toastBadge" class="toast-icon"></div>
    <span id="toastMessage">Notifikasi</span>
  </div>

  <div id="mainOverlay" class="modal-overlay" onclick="tutupSemuaModal()"></div>

  <div id="usernameModal" class="form-modal modal-center">

    <p style="text-align:center; color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 24px;">Silakan masukkan nama Anda.</p>
    <form onsubmit="simpanUsername(event)" novalidate>
      <input type="text" id="usernameInput" class="input-control" placeholder="Maks 7 huruf..." maxlength="7" style="margin-bottom: 16px; text-align: center; font-size: 18px;">

  <div id="settingsModal" class="form-modal modal-center">

    <button class="settings-list-btn" onclick="bukaModalRiwayat()">📜 Riwayat Lengkap (30 Hari)</button>

    <div id="currencyPanel" class="currency-panel" style="margin-top: 6px;">
      <div class="currency-refresh-row">
        <div class="currency-panel-title" style="flex: 1; min-width: 0;">

          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.36 6.36"></path><path d="M3 12A9 9 0 0 1 18.36 5.64"></path><polyline points="21 4 21 10 15 10"></polyline><polyline points="3 20 3 14 9 14"></polyline></svg>
        </button>

        <button type="button" id="currencyUsdBtn" class="currency-toggle-btn" onclick="setDisplayCurrency('USD')">US Dollar · $</button>
      </div>
    </div>
  </div>

  <div id="historyModal" class="form-modal" style="height: 85vh; display: flex; flex-direction: column; padding-bottom: 20px;">
    <div class="modal-header" style="margin-bottom: 12px;">
      <h3 class="modal-title">Riwayat Lengkap</h3>
      <div style="display: flex; gap: 8px;">
        <button class="close-btn" id="btnSelectMode" style="background: rgba(59,130,246,0.3); color: #93c5fd;" onclick="toggleSelectMode()">Pilih</button>
        <button class="close-btn" style="width:28px;" onclick="tutupSemuaModal()">&times;</button>
      </div>
    </div>
    <div class="form-group" style="margin-bottom: 12px;">
      <input type="text" id="searchHistoryInput" class="input-control" placeholder="🔍 Cari transaksi..." oninput="handleSearchHistory()">

    <div id="historyContainer" style="overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 12px; padding-right: 5px;"></div>
    <div id="bulkActionBar" style="display: none; gap: 10px; margin-top: 16px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 16px;">
      <button class="submit-btn" style="margin:0; background: rgba(239, 68, 68, 0.2); color: #f87171; box-shadow: none;" onclick="hapusSemuaKonfirmasi()">Hapus Semua</button>
      <button class="submit-btn" style="margin:0; background: #ef4444;" onclick="hapusTerpilihKonfirmasi()">Hapus Terpilih</button>

  <div id="formModal" class="form-modal">
    <div class="modal-header">
      <h3 class="modal-title" id="formModalTitle">Tambah Transaksi</h3>
      <button class="close-btn" style="width:28px;" onclick="tutupSemuaModal()">&times;</button>

    <form id="transactionForm" onsubmit="handleFormSubmit(event)" novalidate>
      <div class="form-group">
        <label class="form-label" for="tanggal">Tanggal</label>

      <div class="form-group">

        <div class="segmented-control">
          <input type="radio" id="typeExpense" name="tipe" value="Pengeluaran" checked>
          <label for="typeExpense" class="segment-label label-expense">Pengeluaran</label>

      </div>

      <div class="form-group">

      <div class="form-group">
        <label class="form-label" for="keterangan">Keterangan / Kategori</label>

  <div id="actionModal" class="form-modal modal-center" style="z-index: 104;">
    <h3 class="modal-title" style="text-align:center; margin-bottom: 20px;">Opsi Transaksi</h3>
    <button class="settings-list-btn" onclick="prosesEditOpsi()">✏️ Edit Transaksi</button>
    <button class="settings-list-btn" onclick="prosesHapusSatuKonfirmasi()" style="background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); color: #f87171;">🗑️ Hapus Transaksi</button>
    <button class="submit-btn" onclick="tutupOpsiModal()" style="background: rgba(255,255,255,0.1); box-shadow: none; margin-top: 10px;">Batal</button>
  </div>

  <div id="confirmModal" class="form-modal modal-center" style="z-index: 105;">
    <h3 class="modal-title" id="confirmTitle" style="text-align:center; margin-bottom: 12px;">Konfirmasi Hapus</h3>
    <p id="confirmMsg" style="text-align:center; color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 24px;">Apakah Anda yakin?</p>

      <button id="btnConfirmDelete" class="submit-btn" onclick="eksekusiHapusTransaksi()" style="background: #ef4444; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); margin-top: 0;">Hapus</button>
    </div>
  </div>

  <div class="app-container">
    <header class="app-header">
      <h1 class="app-title" id="greetingText">Memuat...</h1>

        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <section class="glass-card">
      <div class="balance-section">
        <div class="balance-header">
          <p class="balance-label">Total Balance</p>
          <button type="button" class="eye-btn" onclick="toggleMata()" id="eyeIconSvg" aria-label="Sembunyikan saldo" aria-pressed="false"></button>
        </div>
        <h2 id="totalBalance" class="balance-amount">Rp 0</h2>
      </div>

      <div class="flow-grid">
        <div class="flow-item">
          <span class="flow-title"><div class="flow-indicator indicator-in"></div>Pemasukan</span>
          <span id="totalIncome" class="flow-value">Rp 0</span>
        </div>
        <div class="flow-item">
          <span class="flow-title"><div class="flow-indicator indicator-out"></div>Pengeluaran</span>
          <span id="totalExpense" class="flow-value">Rp 0</span>
        </div>
      </div>
    </section>

    <section class="last-section">
      <div class="section-header-row">
        <h3 class="section-title">Transaksi Terakhir</h3>
        <button type="button" id="refreshBtn" class="refresh-btn" onclick="handleManualRefresh()" aria-label="Refresh data beranda">
          <svg viewBox="0 0 24 24">
            <path d="M21 12a9 9 0 0 1-15.3 6.4"></path>
            <path d="M3 12A9 9 0 0 1 18.3 5.6"></path>
            <path d="M18 2v4h-4"></path>
            <path d="M6 22v-4h4"></path>
          </svg>
        </button>
      </div>
      <div id="transactionContainer" class="transaction-list stacked-list">

      </div>

  <button class="fab-btn" onclick="bukaModalTransaksi()">
    <svg class="fab-icon" viewBox="0 0 24 24">
      <line x1="12" y1="5" x2="12" y2="19"></line>
      <line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
  </button>

  <script>
    let selectedTxId = null;
    let editingTxId = null;
    let longPressTimer;
    let isSelectMode = false;
    let deleteMode = null; 
    let isBalanceHidden = localStorage.getItem('fin_hide_balance') === 'true';
    const MASKED_AMOUNT = '•••••••';
    let displayCurrency = localStorage.getItem('fin_display_currency') || 'IDR';
    let usdIdrRate = Number(localStorage.getItem('fin_usd_idr_rate')) || null;
    let usdIdrRateDate = localStorage.getItem('fin_usd_idr_date') || '';
    let usdIdrFetchedAt = Number(localStorage.getItem('fin_usd_idr_fetched_at')) || 0;
    let fxRefreshTimer = null;
    let isFxUpdating = false;
    let fxLastErrorMessage = '';
    let toastTimer = null;
    let greetingTimer = null;
    let greetingVisitInfo = null;

    /* FUNGSI TOGGLE MATA SALDO */
    function renderMataIcon() {
      const eyeIcon = document.getElementById('eyeIconSvg');
      if (!eyeIcon) return;

      eyeIcon.innerHTML = isBalanceHidden
        ? `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path><path d="M14.12 14.12a3 3 0 0 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`
        : `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;

      eyeIcon.setAttribute('aria-pressed', String(isBalanceHidden));
      eyeIcon.setAttribute('aria-label', isBalanceHidden ? 'Tampilkan saldo' : 'Sembunyikan saldo');
    }

    function toggleMata() {
      isBalanceHidden = !isBalanceHidden;
      localStorage.setItem('fin_hide_balance', isBalanceHidden);
      renderMataIcon();
      if (window.dbInitialized) renderDashboardFromCache();
    }

    function kunciScrollBody() {
      if (document.body.classList.contains('modal-scroll-locked')) return;
      modalScrollY = window.scrollY || document.documentElement.scrollTop || 0;
      document.body.style.top = `-${modalScrollY}px`;
      document.body.classList.add('modal-scroll-locked');
    }

    function lepasScrollBody() {
      if (!document.body.classList.contains('modal-scroll-locked')) return;
      const y = Math.abs(parseInt(document.body.style.top || '0', 10)) || modalScrollY || 0;
      document.body.classList.remove('modal-scroll-locked');
      document.body.style.top = '';
      window.scrollTo(0, y);
    }

    function aktifkanOverlayModal() {
      document.getElementById('mainOverlay').classList.add('active');
      kunciScrollBody();
    }

    function nonaktifkanOverlayModal() {
      document.getElementById('mainOverlay').classList.remove('active');
      lepasScrollBody();
    }

    function initModalScrollGuard() {
      const overlay = document.getElementById('mainOverlay');
      const historyContainer = document.getElementById('historyContainer');
      if (overlay) {
        overlay.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        overlay.addEventListener('wheel', (e) => e.preventDefault(), { passive: false });
      }
      if (!historyContainer) return;

      historyContainer.addEventListener('touchstart', (e) => {
        historyTouchStartY = e.touches?.[0]?.clientY || 0;
      }, { passive: true });

      historyContainer.addEventListener('touchmove', (e) => {
        const currentY = e.touches?.[0]?.clientY || historyTouchStartY;
        const deltaY = currentY - historyTouchStartY;
        const atTop = historyContainer.scrollTop <= 0;
        const atBottom = Math.ceil(historyContainer.scrollTop + historyContainer.clientHeight) >= historyContainer.scrollHeight;

        if ((atTop && deltaY > 0) || (atBottom && deltaY < 0)) {
          e.preventDefault();
        }
        e.stopPropagation();
      }, { passive: false });

      historyContainer.addEventListener('wheel', (e) => {
        e.stopPropagation();
      }, { passive: true });
    }

    /* KONTROL UI MODAL & PEMILIHAN */
    function resetSelectMode() {
      isSelectMode = false;
      document.getElementById('bulkActionBar').style.display = 'none';
      const btn = document.getElementById('btnSelectMode');
      btn.innerText = 'Pilih';
      btn.style.background = 'rgba(59,130,246,0.3)';
      btn.style.color = '#93c5fd';
      document.querySelectorAll('.tx-checkbox').forEach(cb => {
        cb.style.display = 'none';
        cb.checked = false;
        const card = cb.closest('.transaction-item');
        card.style.background = '';
        card.style.borderColor = 'rgba(255, 255, 255, 0.22)';
      });
    }

    function toggleSelectMode() {
      isSelectMode = !isSelectMode;
      const checkboxes = document.querySelectorAll('.tx-checkbox');
      const btn = document.getElementById('btnSelectMode');
      const actionBar = document.getElementById('bulkActionBar');
      
      if(isSelectMode) {
        checkboxes.forEach(cb => { cb.style.display = 'flex'; cb.checked = false; });
        actionBar.style.display = 'flex';
        btn.innerText = 'Batal';
        btn.style.background = 'rgba(239, 68, 68, 0.3)';
        btn.style.color = '#fca5a5';
      } else {
        resetSelectMode();
      }
    }

    function tutupSemuaModal() {
      nonaktifkanOverlayModal();
      document.getElementById('formModal').classList.remove('active');
      document.getElementById('settingsModal').classList.remove('active');
      document.getElementById('usernameModal').classList.remove('active');
      document.getElementById('historyModal').classList.remove('active');
      document.getElementById('actionModal').classList.remove('active');
      document.getElementById('confirmModal').classList.remove('active');
      resetSelectMode();
    }

    function tutupOpsiModal() {
      document.getElementById('actionModal').classList.remove('active');
      if (!document.getElementById('historyModal').classList.contains('active')) {
        nonaktifkanOverlayModal();
      }
    }

    function bukaModalTransaksi() {
      tutupSemuaModal();
      editingTxId = null;
      document.getElementById('formModalTitle').innerText = "Tambah Transaksi";
      document.getElementById('transactionForm').reset();
      document.getElementById('typeExpense').checked = true;
      document.getElementById('tanggal').valueAsDate = new Date();
      aktifkanOverlayModal();
      document.getElementById('formModal').classList.add('active');
    }

    function bukaModalPengaturan() {
      tutupSemuaModal();
      aktifkanOverlayModal();
      document.getElementById('settingsModal').classList.add('active');
    }

    function bukaModalGantiNama() {
      tutupSemuaModal();
      document.getElementById('usernameInput').value = localStorage.getItem('fin_username') || "";
      aktifkanOverlayModal();
      document.getElementById('usernameModal').classList.add('active');
    }

    async function bukaModalRiwayat() {
      tutupSemuaModal();
      document.getElementById('searchHistoryInput').value = '';
      aktifkanOverlayModal();
      document.getElementById('historyModal').classList.add('active');
      await renderRiwayatPenuh();
    }

    function bukaModalOpsi(id) {
      document.getElementById('actionModal').classList.add('active');
      selectedTxId = id;
    }

    function prosesHapusSatuKonfirmasi() {
      document.getElementById('actionModal').classList.remove('active');
      deleteMode = 'single';
      document.getElementById('confirmTitle').innerText = "Hapus Transaksi";
      document.getElementById('confirmMsg').innerText = "Apakah Anda yakin ingin menghapus data ini?";
      document.getElementById('confirmModal').classList.add('active');
    }

    function hapusTerpilihKonfirmasi() {
      const terpilih = document.querySelectorAll('.tx-checkbox:checked');
      if (terpilih.length === 0) return showToast("Pilih minimal 1 data!", false);
      deleteMode = 'bulk';
      document.getElementById('confirmTitle').innerText = "Hapus Terpilih";
      document.getElementById('confirmMsg').innerText = `Apakah Anda yakin ingin menghapus ${terpilih.length} transaksi?`;
      document.getElementById('confirmModal').classList.add('active');
    }

    function hapusSemuaKonfirmasi() {
      deleteMode = 'all';
      document.getElementById('confirmTitle').innerText = "PERINGATAN BAHAYA";
      document.getElementById('confirmMsg').innerText = "Yakin ingin MENGHAPUS SELURUH riwayat Anda? Data tidak bisa dikembalikan.";
      document.getElementById('confirmModal').classList.add('active');
    }

    function batalHapus() {
      document.getElementById('confirmModal').classList.remove('active');
      if(deleteMode === 'single') document.getElementById('actionModal').classList.add('active');
    }

    /* REVISI BESAR: EKSEKUSI HAPUS SEGERA MENUNGGU UI SELESAI */
    async function eksekusiHapusTransaksi() {
      const btn = document.getElementById('btnConfirmDelete');
      btn.disabled = true; btn.innerText = "Menghapus...";

      try {
        document.getElementById('confirmModal').classList.remove('active');
        if (!document.getElementById('historyModal').classList.contains('active')) {
           nonaktifkanOverlayModal();
        }

        if (deleteMode === 'single' && selectedTxId) {
          transaksiCache = transaksiCache.filter(tx => tx.id !== selectedTxId);
          scheduleRefreshDashboard();
          scheduleRenderRiwayatPenuh();
          await nextFrame();
          await hapusDataById(selectedTxId);
          showToast("Transaksi dihapus!");
        }
        else if (deleteMode === 'bulk') {
          const terpilih = Array.from(document.querySelectorAll('.tx-checkbox:checked')).map(cb => Number(cb.value));
          const idSet = new Set(terpilih);
          document.querySelectorAll('.tx-checkbox:checked').forEach(cb => cb.closest('.transaction-item')?.classList.add('removing'));
          transaksiCache = transaksiCache.filter(tx => !idSet.has(tx.id));
          resetSelectMode();
          scheduleRefreshDashboard();
          scheduleRenderRiwayatPenuh();
          await nextFrame();
          await hapusBanyakData(terpilih);
          showToast(`${terpilih.length} data dihapus!`);
        }
        else if (deleteMode === 'all') {
          transaksiCache = [];
          resetSelectMode();
          renderDashboardFromCache();
          scheduleRenderRiwayatPenuh('');
          await nextFrame();
          await hapusSemuaData();
          showToast("Seluruh riwayat dihapus!");
        }
      } catch (err) {
        await refreshDashboard();
        showToast("Terjadi kesalahan sistem", false);
      } finally {
        btn.disabled = false; btn.innerText = "Hapus";
      }
    }

    function ikatkanEventLongPress(element, id) {
      element.addEventListener('contextmenu', e => { e.preventDefault(); return false; });
      let moved = false;
      
      const triggerStart = () => {
        if(isSelectMode) return;
        moved = false;
        longPressTimer = setTimeout(() => {
          if (!moved) {
            if (navigator.vibrate) navigator.vibrate([50]);
            aktifkanOverlayModal();
            bukaModalOpsi(id);
          }
        }, 550);
      };

      const triggerCancel = () => clearTimeout(longPressTimer);
      const handleMove = () => { moved = true; clearTimeout(longPressTimer); };

      element.addEventListener('touchstart', triggerStart, { passive: true });
      element.addEventListener('touchend', triggerCancel, { passive: true });
      element.addEventListener('touchmove', handleMove, { passive: true });
      element.addEventListener('mousedown', triggerStart);
      element.addEventListener('mouseup', triggerCancel);
      element.addEventListener('mouseleave', triggerCancel);

      element.addEventListener('click', (e) => {
        if(isSelectMode) {
          e.preventDefault();

      const tanggal = String(date.getDate()).padStart(2, '0');
      return `${tahun}-${bulan}-${tanggal}`;

    function catatKunjunganHariIni() {

      const hariIni = getTanggalLokalKey();
      const tanggalTerakhir = localStorage.getItem('fin_last_open_date');
      let jumlahBukaHariIni = Number(localStorage.getItem('fin_open_count_today') || '0');

      if (tanggalTerakhir === hariIni) {

      }

      localStorage.setItem('fin_last_open_date', hariIni);
      localStorage.setItem('fin_open_count_today', String(jumlahBukaHariIni));

      greetingVisitInfo = {
        date: hariIni,
        count: jumlahBukaHariIni,
        isFirstOpenToday: jumlahBukaHariIni === 1

      if (jam >= 5 && jam < 11) return 'Pagi';

    function validasiPayloadTransaksi() {
      const tanggalInput = document.getElementById('tanggal');
      const nominalInput = document.getElementById('nominal');
      const keteranganInput = document.getElementById('keterangan');
      const tipeTerpilih = document.querySelector('input[name="tipe"]:checked')?.value || 'Pengeluaran';
      const nominalValue = Number(nominalInput.value);

      if (!tanggalInput.value) {
        tampilkanErrorForm('Tanggal wajib diisi.', tanggalInput);
        return null;
      }

      if (!nominalInput.value || !Number.isFinite(nominalValue) || nominalValue <= 0) {
        tampilkanErrorForm('Nominal wajib diisi dengan angka lebih dari 0.', nominalInput);
        return null;
      }

      if (!keteranganInput.value.trim()) {
        tampilkanErrorForm('Keterangan wajib diisi.', keteranganInput);
        return null;
      }

      return {
        tanggal: tanggalInput.value,
        tipe: tipeTerpilih,
        nominal: nominalValue,
        keterangan: keteranganInput.value.trim()
      };
    }

    /* ==========================================================================
       REVISI BESAR: SISTEM DATABASE INSTAN (PERSISTENT CONNECTION CACHE)
       ========================================================================== */
    const DB_NAME = 'KeuanganDB';
    const DB_VERSION = 1;
    const STORE_NAME = 'transaksi';
    window.dbInitialized = false;
    
    // Variabel Penahan Koneksi agar tidak buka-tutup berulang (Mengatasi Freeze)
    let dbInstance = null;

    // Cache memori agar UI bisa langsung berubah tanpa menunggu IndexedDB + render ulang penuh.
    let transaksiCache = [];
    let lastKnownId = 0;
    let refreshFrameId = null;
    let stackFrameId = null;
    let historyRenderFrameId = null;
    let modalScrollY = 0;
    let historyTouchStartY = 0;

    function nextFrame() {
      return new Promise(resolve => requestAnimationFrame(() => resolve()));
    }

    function sortTransaksiTerbaru(data) {
      return [...data].sort((a, b) => (b.id || 0) - (a.id || 0));
    }

    function updateLastKnownId() {
      lastKnownId = transaksiCache.reduce((max, tx) => Math.max(max, Number(tx.id) || 0), 0);
    }

    function scheduleRefreshDashboard() {
      if (refreshFrameId) cancelAnimationFrame(refreshFrameId);
      refreshFrameId = requestAnimationFrame(() => {
        refreshFrameId = null;
        renderDashboardFromCache();
      });
    }

    function scheduleRenderRiwayatPenuh(filterTeks = null) {
      const keyword = filterTeks ?? document.getElementById('searchHistoryInput')?.value ?? '';
      if (historyRenderFrameId) cancelAnimationFrame(historyRenderFrameId);
      historyRenderFrameId = requestAnimationFrame(() => {
        historyRenderFrameId = null;
        renderRiwayatPenuh(keyword);
      });
    }


    function clampValue(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function setupStackedCards() {
      const container = document.getElementById('transactionContainer');
      if (!container) return;

      const cards = Array.from(container.querySelectorAll('.transaction-item'));
      cards.forEach((card, index) => {
        const slot = Math.min(index, 5);
        card.style.setProperty('--stack-slot', slot);
        card.style.setProperty('--stack-top', `${8 + (slot * 7)}px`);
        card.style.setProperty('--stack-z', 100 - index);
      });

      if (!container.dataset.stackBound) {
        container.addEventListener('scroll', requestStackPaint, { passive: true });
        container.dataset.stackBound = 'true';
      }

      if (!window.__finStackResizeBound) {
        window.addEventListener('resize', requestStackPaint, { passive: true });
        window.__finStackResizeBound = true;
      }

      requestStackPaint();
    }

    function requestStackPaint() {
      if (stackFrameId) return;
      stackFrameId = requestAnimationFrame(() => {
        stackFrameId = null;
        paintStackedCards();
      });
    }

    function paintStackedCards() {
      const container = document.getElementById('transactionContainer');
      if (!container) return;

      const cards = container.querySelectorAll('.transaction-item');
      if (cards.length === 0) return;

      const cachedStep = Number(container.dataset.cardStep || 0);
      const cardStep = cachedStep || Math.max(cards[0].offsetHeight + 12, 72);
      if (!cachedStep) container.dataset.cardStep = String(cardStep);
      const scrollTop = container.scrollTop;

      cards.forEach((card, index) => {
        const start = index * cardStep;
        const progress = clampValue((scrollTop - start) / cardStep, 0, 1);
        const scale = 1 - (progress * 0.045);
        const y = -progress * 5;
        const opacity = 1 - (progress * 0.07);

        card.style.setProperty('--stack-scale', scale.toFixed(3));
        card.style.setProperty('--stack-y', `${y.toFixed(2)}px`);
        card.style.opacity = opacity.toFixed(3);
      });
    }

    function initDB() {
      return new Promise((resolve, reject) => {
        if (dbInstance) {
          resolve(dbInstance);
          return;
        }
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
          }
        };
        request.onsuccess = (e) => {
          dbInstance = e.target.result;
          resolve(dbInstance);
        };
        request.onerror = (e) => reject("DB Error: " + e.target.error);
      });
    }

    async function simpanKeDatabase(data) {
      const db = await initDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction([STORE_NAME], 'readwrite');
        const req = tx.objectStore(STORE_NAME).add(data);
        let insertedId = null;
        req.onsuccess = () => { insertedId = req.result; };
        tx.oncomplete = () => resolve(insertedId);
        tx.onerror = (e) => reject(e.target.error);
      });
    }

    async function perbaruiDatabase(data) {
      const db = await initDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction([STORE_NAME], 'readwrite');
        tx.objectStore(STORE_NAME).put(data);
        tx.oncomplete = () => resolve(true);
        tx.onerror = (e) => reject(e.target.error);
      });
    }

    async function ambilDataById(id) {
      const db = await initDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction([STORE_NAME], 'readonly');
        const req = tx.objectStore(STORE_NAME).get(id);
        req.onsuccess = () => resolve(req.result);
        req.onerror = (e) => reject(e.target.error);
      });
    }

    async function ambilSemuaData() {
      try {
        const db = await initDB();
        return new Promise((resolve, reject) => {
          const tx = db.transaction([STORE_NAME], 'readonly');
          const req = tx.objectStore(STORE_NAME).getAll();
          req.onsuccess = () => resolve(req.result || []);
          req.onerror = (e) => reject(e.target.error);
        });
      } catch (e) { return []; }
    }

    async function hapusDataById(id) {
      const db = await initDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction([STORE_NAME], 'readwrite');
        tx.objectStore(STORE_NAME).delete(id);
        tx.oncomplete = () => resolve(true);
        tx.onerror = (e) => reject(e.target.error);
      });
    }
    
    /* REVISI: Fungsi Akselerasi Hapus Database Instan menggunakan .clear() */
    async function hapusSemuaData() {
      const db = await initDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction([STORE_NAME], 'readwrite');
        tx.objectStore(STORE_NAME).clear();
        tx.oncomplete = () => resolve(true);
        tx.onerror = (e) => reject(e.target.error);
      });
    }

    async function hapusBanyakData(idsArray) {
      const db = await initDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction([STORE_NAME], 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        idsArray.forEach(id => store.delete(id));
        tx.oncomplete = () => resolve(true);
        tx.onerror = (e) => reject(e.target.error);
      });
    }

        .filter(tx => new Date(tx.tanggal).getTime() < batas.getTime())
        .map(tx => tx.id);
      if (idsLama.length > 0) await hapusBanyakData(idsLama);
    }

    function formatRupiah(angka) {
      const nilai = Number(angka) || 0;
      return Math.abs(Math.round(nilai)).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    function hasValidUsdRate() {
      return Number.isFinite(Number(usdIdrRate)) && Number(usdIdrRate) > 0;
    }

    function getDisplayCurrencyPrefix() {
      return displayCurrency === 'USD' ? '$' : 'Rp';
    }

    function formatUsdNumber(nilai) {
      return Math.abs(Number(nilai) || 0).toLocaleString('en-US', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function formatDisplayCurrency(idrAmount, options = {}) {
      const nilaiIdr = Number(idrAmount) || 0;
      const forceSign = options.forceSign || null;
      const useSign = forceSign || (nilaiIdr < 0 ? '-' : '');

      if (displayCurrency === 'USD') {
        if (!hasValidUsdRate()) return `${useSign}$ --`;
        const nilaiUsd = Math.abs(nilaiIdr) / Number(usdIdrRate);
        return `${useSign}$ ${formatUsdNumber(nilaiUsd)}`;
      }

      return `${useSign}Rp ${formatRupiah(nilaiIdr)}`;
    }

    function formatTransactionAmount(tx) {
      if (isBalanceHidden) return `${getDisplayCurrencyPrefix()} ${MASKED_AMOUNT}`;
      const sign = tx.tipe === 'Pemasukan' ? '+' : '-';
      return `${sign} ${formatDisplayCurrency(tx.nominal)}`;
    }

      const idrBtn = document.getElementById('currencyIdrBtn');

    function bacaRateFrankfurter(data) {
      const kandidat = [
        data?.rates?.IDR,
        data?.quotes?.IDR,
        data?.rate,
        data?.data?.IDR,
        data?.data?.IDR?.value
      ];

      for (const nilai of kandidat) {
        const rate = Number(nilai);
        if (Number.isFinite(rate) && rate > 0) return rate;
      }
      return null;
    }

    async function fetchJsonDenganTimeout(url, timeoutMs = 12000) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

      try {
        const response = await fetch(url, {
          cache: 'no-store',
          signal: controller.signal,
          headers: { 'Accept': 'application/json' }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } finally {
        clearTimeout(timeoutId);
      }
    }

    async function fetchUsdIdrRateFromFrankfurter() {
      const endpoints = [
        { nama: 'Frankfurter v2', url: 'https://api.frankfurter.dev/v2/rates?base=USD&quotes=IDR' },
        { nama: 'Frankfurter v1', url: 'https://api.frankfurter.dev/v1/latest?base=USD&symbols=IDR' },
        { nama: 'Frankfurter legacy', url: 'https://api.frankfurter.app/latest?from=USD&to=IDR' }
      ];

      const errorList = [];
      for (const endpoint of endpoints) {
        try {
          const data = await fetchJsonDenganTimeout(endpoint.url);
          const rate = bacaRateFrankfurter(data);
          if (!rate) throw new Error('IDR tidak ada di respons API');
          return {
            rate,
            date: data?.date || data?.updated || new Date().toISOString().slice(0, 10),
            source: endpoint.nama
          };
        } catch (err) {
          const pesan = err?.name === 'AbortError' ? 'timeout' : (err?.message || 'gagal');
          errorList.push(`${endpoint.nama}: ${pesan}`);
        }
      }

      throw new Error(errorList.join(' | ') || 'Gagal mengambil kurs');
    }

    async function refreshFxRate(options = {}) {
      const { silent = true, rerender = true } = options;
      if (isFxUpdating) return false;

      isFxUpdating = true;
      fxLastErrorMessage = '';
      updateCurrencyControls();

      try {
        const result = await fetchUsdIdrRateFromFrankfurter();
        usdIdrRate = result.rate;
        usdIdrRateDate = result.date;
        usdIdrFetchedAt = Date.now();
        fxLastErrorMessage = '';
        localStorage.setItem('fin_usd_idr_rate', String(usdIdrRate));
        localStorage.setItem('fin_usd_idr_date', usdIdrRateDate);
        localStorage.setItem('fin_usd_idr_fetched_at', String(usdIdrFetchedAt));
        if (!silent) showToast('Kurs USD diperbarui!', true);
        return true;
      } catch (err) {
        const detail = err?.message || 'koneksi/API gagal';
        fxLastErrorMessage = hasValidUsdRate()
          ? 'Memakai cache kurs terakhir'
          : 'Gagal ambil kurs USD';
        console.warn('Gagal memperbarui kurs USD/IDR:', detail);
        if (!silent) showToast(hasValidUsdRate() ? 'Gagal update, memakai cache kurs' : 'Gagal mengambil kurs USD', false);
        return false;
      } finally {
        isFxUpdating = false;
        updateCurrencyControls();
        if (rerender) {
          renderDashboardFromCache();
          scheduleRenderRiwayatPenuh();
        }
      }
    }

    async function refreshCurrencyManual() {
      await refreshFxRate({ silent: false, rerender: true });
    }

    function startFxAutoRefresh() {
      if (fxRefreshTimer) clearInterval(fxRefreshTimer);
      fxRefreshTimer = setInterval(() => {

      document.addEventListener('visibilitychange', () => {

    function setDisplayCurrency(currency) {
      if (!['IDR', 'USD'].includes(currency)) return;
      displayCurrency = currency;
      localStorage.setItem('fin_display_currency', displayCurrency);
      updateCurrencyControls();

      }
    }

    function buatNodeTransaksi(tx, isHistory = false, index = 0) {
      const isIncome = tx.tipe === 'Pemasukan';
      const tglArr = tx.tanggal.split('-');
      const div = document.createElement('div');
      div.className = 'glass-card transaction-item';
      if (!isHistory) {
        const slot = Math.min(index, 5);
        div.style.setProperty('--stack-slot', slot);
        div.style.setProperty('--stack-top', `${8 + (slot * 7)}px`);
        div.style.setProperty('--stack-z', 100 - index);
      }
      
      const checkboxHtml = isHistory ? `<input type="checkbox" class="tx-checkbox" value="${tx.id}" style="display: ${isSelectMode ? 'flex' : 'none'}; margin-right: 14px;">` : '';
      
      div.innerHTML = `
        <div class="transaction-left">
          ${checkboxHtml}
          <div class="icon-wrapper">${getSmartIcon(tx.keterangan, tx.tipe)}</div>
          <div class="tx-details">
            <span class="tx-title" title="${tx.keterangan}">${tx.keterangan}</span>
            <span class="tx-date">${tglArr[2]}/${tglArr[1]}/${tglArr[0]}</span>
          </div>
        </div>
        <span class="tx-amount ${isIncome ? 'amount-in' : 'amount-out'}">${formatTransactionAmount(tx)}</span>
      `;
      ikatkanEventLongPress(div, tx.id);
      return div;
    }

    function renderDashboardFromCache() {
      const dataRiwayat = transaksiCache;
      let totalMasuk = 0; let totalKeluar = 0;

      for (const tx of dataRiwayat) {
        if (tx.tipe === "Pemasukan") totalMasuk += Number(tx.nominal);
        else totalKeluar += Number(tx.nominal);
      }

      const nilaiSaldo = totalMasuk - totalKeluar;
      const teksSaldo = isBalanceHidden ? `${getDisplayCurrencyPrefix()} ${MASKED_AMOUNT}` : formatDisplayCurrency(nilaiSaldo);
      const teksMasuk = isBalanceHidden ? `${getDisplayCurrencyPrefix()} ${MASKED_AMOUNT}` : formatDisplayCurrency(totalMasuk);
      const teksKeluar = isBalanceHidden ? `${getDisplayCurrencyPrefix()} ${MASKED_AMOUNT}` : formatDisplayCurrency(totalKeluar);

      const totalBalanceEl = document.getElementById('totalBalance');
      totalBalanceEl.innerText = teksSaldo;
      totalBalanceEl.classList.toggle('balance-negative', !isBalanceHidden && nilaiSaldo < 0);
      document.getElementById('totalIncome').innerText = teksMasuk;
      document.getElementById('totalExpense').innerText = teksKeluar;

      const containerDepan = document.getElementById('transactionContainer');
      containerDepan.replaceChildren();

      if (dataRiwayat.length === 0) {
        containerDepan.innerHTML = '<div class="glass-card" style="text-align:center;color:rgba(255,255,255,0.4);padding:20px;">Belum ada riwayat.</div>';
        containerDepan.scrollTop = 0;
        return;
      }

      const frag = document.createDocumentFragment();
      sortTransaksiTerbaru(dataRiwayat).slice(0, 15).forEach((tx, index) => frag.appendChild(buatNodeTransaksi(tx, false, index)));
      containerDepan.appendChild(frag);
      delete containerDepan.dataset.cardStep;
      setupStackedCards();
    }

    async function refreshDashboard() {
      transaksiCache = await ambilSemuaData();
      updateLastKnownId();
      renderDashboardFromCache();
      updateCurrencyControls();
      if (document.getElementById('historyModal')?.classList.contains('active')) {
        scheduleRenderRiwayatPenuh();
      }
    }

    async function handleManualRefresh() {
      const btn = document.getElementById('refreshBtn');
      if (btn?.disabled) return;

      try {
        if (btn) {
          btn.disabled = true;
          btn.classList.add('is-refreshing');
        }
        if (displayCurrency === 'USD') await refreshFxRate({ silent: true, rerender: false });
        await refreshDashboard();
        await nextFrame();
        showToast('Data beranda diperbarui!', true);
      } catch (err) {
        showToast('Gagal memperbarui data', false);
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.classList.remove('is-refreshing');
        }
      }
    }

    async function renderRiwayatPenuh(filterTeks = '') {
      const dataRiwayat = transaksiCache;
      const containerRiwayat = document.getElementById('historyContainer');
      containerRiwayat.replaceChildren();

      const keyword = filterTeks.toLowerCase();
      const dataFiltered = sortTransaksiTerbaru(dataRiwayat).filter(tx => tx.keterangan.toLowerCase().includes(keyword));

      if (dataFiltered.length === 0) {
        containerRiwayat.innerHTML = '<div class="glass-card" style="text-align:center;color:rgba(255,255,255,0.4);padding:20px;">Tidak ada data.</div>';
        return;
      }

      const frag = document.createDocumentFragment();
      dataFiltered.forEach((tx, index) => frag.appendChild(buatNodeTransaksi(tx, true, index))); 
      containerRiwayat.appendChild(frag);
    }

    function handleSearchHistory() {
      const kataKunci = document.getElementById('searchHistoryInput').value;
      scheduleRenderRiwayatPenuh(kataKunci);
    }

    async function prosesEditOpsi() {
      const tx = transaksiCache.find(item => item.id === selectedTxId) || await ambilDataById(selectedTxId);
      if(tx) {
        document.getElementById('actionModal').classList.remove('active');
        editingTxId = tx.id;
        document.getElementById('formModalTitle').innerText = "Edit Transaksi";
        document.getElementById('tanggal').value = tx.tanggal;
        document.getElementById('nominal').value = tx.nominal;
        document.getElementById('keterangan').value = tx.keterangan;
        
        if (tx.tipe === "Pemasukan") document.getElementById('typeIncome').checked = true;
        else document.getElementById('typeExpense').checked = true;

        document.getElementById('formModal').classList.add('active');
      }
    }

    /* REVISI BESAR: AWAIT KETAT UNTUK PROSES INPUT/EDIT (Langsung Muncul Tanpa Delay) */
    async function handleFormSubmit(event) {
      event.preventDefault();
      const payload = validasiPayloadTransaksi();
      if (!payload) return;

      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.innerText = "Menyimpan...";

      try {
        document.getElementById('transactionForm').reset();
        tutupSemuaModal();

        if(editingTxId !== null) {
          payload.id = editingTxId;
          transaksiCache = transaksiCache.map(tx => tx.id === editingTxId ? payload : tx);
          renderDashboardFromCache();
          scheduleRenderRiwayatPenuh();
          await nextFrame();
          await perbaruiDatabase(payload);
          showToast("Transaksi Diperbarui!", true);
        } else {
          const optimisticPayload = { ...payload, id: lastKnownId + 1 };
          transaksiCache.push(optimisticPayload);
          updateLastKnownId();
          renderDashboardFromCache();
          scheduleRenderRiwayatPenuh();
          await nextFrame();
          const insertedId = await simpanKeDatabase(payload);
          if (insertedId && insertedId !== optimisticPayload.id) {
            optimisticPayload.id = insertedId;
            updateLastKnownId();
            scheduleRefreshDashboard();
          }
          showToast("Transaksi Dicatat!", true);
        }
        
      } catch (err) {
        await refreshDashboard();
        showToast("Terjadi kendala penyimpanan", false); 
      } finally { 
        btn.disabled = false; btn.innerText = "Simpan Transaksi"; 
      }
    }
  </script>
</body>
